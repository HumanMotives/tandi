<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5efe0">
<title>De Verborgen Laag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --cream:      #f5efe0;
  --cream2:     #ede4ce;
  --warm:       #faf6ee;
  --sage:       #7a9e7e;
  --sage-dark:  #4a7050;
  --sage-light: #b8d4ba;
  --gold:       #c8943a;
  --gold-light: #e8b84a;
  --gold-pale:  #f5e0a0;
  --teal:       #4a8080;
  --brown:      #7a5030;
  --text:       #3a2e1e;
  --text-soft:  #7a6a4a;
  --text-faint: #b0a080;
  --border:     rgba(122,80,48,0.15);
  --shadow:     rgba(58,46,30,0.10);
  --radius:     18px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:'Lora',Georgia,serif; background:var(--cream); color:var(--text); }

/* ══ SCREENS ══ */
.screen { position:fixed; inset:0; display:none; flex-direction:column; background:var(--cream); }
.screen.active { display:flex; }

/* ══════════════════════════════════
   SCREEN 1 — KAART
══════════════════════════════════ */
#s-map { background:var(--cream); }

.map-topbar {
  padding: calc(env(safe-area-inset-top,0px) + 0.9rem) 1.1rem 0.9rem;
  background: var(--warm);
  border-bottom: 1px solid var(--border);
  flex-shrink:0;
  display:flex; flex-direction:column; gap:0.3rem;
}
.map-title {
  font-family:'DynaPuff',cursive;
  font-size:1.8rem; font-weight:700;
  color:var(--text); letter-spacing:0.02em;
}
.map-subtitle { font-size:1rem; color:var(--text-soft); font-style:italic; }

#map-el { flex:1; }

/* Word progress bar at bottom of map */
.word-bar {
  background:var(--warm);
  border-top:1px solid var(--border);
  padding:0.8rem 1.1rem;
  display:flex; align-items:center; gap:0.8rem;
  flex-shrink:0;
}
.word-bar-label { font-size:1.1rem; color:var(--text-soft); flex-shrink:0; font-family:"DynaPuff",cursive; }
.word-letters { display:flex; gap:0.5rem; }
.word-letter {
  width:46px; height:46px;
  border:2px solid var(--border);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DynaPuff',cursive;
  font-size:1.8rem; font-weight:700;
  background:var(--cream2);
  color:var(--text-faint);
  transition: all 0.4s;
}
.word-letter.found {
  background:var(--gold-pale);
  border-color:var(--gold);
  color:var(--text);
  animation: letterPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes letterPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }

/* Location card popup (tap on pin) */
.loc-popup {
  position:absolute; bottom:90px; left:12px; right:12px; z-index:600;
  background:var(--warm);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px var(--shadow);
  padding:1rem 1.1rem;
  display:none;
  animation: popupSlide 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.loc-popup.show { display:block; }
@keyframes popupSlide { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.popup-top { display:flex; align-items:flex-start; gap:0.8rem; margin-bottom:0.8rem; }
.popup-emoji {
  width:52px; height:52px; border-radius:14px;
  background:var(--cream2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; flex-shrink:0;
}
.popup-info { flex:1; }
.popup-name {
  font-family:'DynaPuff',cursive;
  font-size:1.6rem; font-weight:700; margin-bottom:0.4rem;
}
.popup-hint { font-size:1.1rem; color:var(--text-soft); font-style:italic; line-height:1.5; }
.popup-meta { display:flex; align-items:center; gap:0.5rem; }
.popup-letter-preview {
  background:var(--gold-pale); border:1.5px solid var(--gold);
  border-radius:6px; padding:0.1rem 0.5rem;
  font-family:'DynaPuff',cursive; font-size:0.9rem; font-weight:700;
  color:var(--brown);
}
.popup-found-badge {
  background:rgba(74,112,80,0.1); border:1px solid var(--sage);
  border-radius:20px; padding:0.2rem 0.6rem;
  font-size:0.72rem; color:var(--sage-dark);
}
.btn-go {
  width:100%; padding:0.95rem;
  background:var(--sage-dark); color:#fff; border:none;
  border-radius:50px; font-family:'DynaPuff',cursive;
  font-size:1.2rem; font-weight:600; cursor:pointer;
  transition:all 0.2s;
}
.btn-go:active { transform:scale(0.97); }
.btn-go.done { background:var(--text-faint); }

/* Leaflet overrides */
.leaflet-tile-pane { filter:saturate(0.55) sepia(0.25) brightness(1.05); }
.leaflet-control-zoom, .leaflet-control-attribution { display:none !important; }

/* Custom pins */
.vl-pin-wrap { cursor:pointer; }
.vl-pin-bubble {
  background:var(--warm);
  border:2.5px solid var(--sage);
  border-radius:12px 12px 12px 2px;
  padding:0.3rem 0.5rem;
  display:flex; align-items:center; gap:0.35rem;
  box-shadow:0 3px 12px var(--shadow);
  white-space:nowrap;
  transition:all 0.2s;
}
.vl-pin-bubble.found { border-color:var(--gold); background:var(--gold-pale); }
.vl-pin-bubble.active-pin { border-color:var(--sage-dark); box-shadow:0 4px 18px rgba(74,112,80,0.35); }
.vl-pin-icon { font-size:1.3rem; line-height:1; }
.vl-pin-name { font-family:'Lora',serif; font-size:0.9rem; color:var(--text); }
.vl-pin-check { font-size:0.85rem; }

.vl-player {
  width:16px; height:16px; border-radius:50%;
  background:#4a7fb5; border:3px solid #fff;
  box-shadow:0 2px 8px rgba(74,127,181,0.6);
}

/* ══════════════════════════════════
   SCREEN 2 — ZOEKEN
══════════════════════════════════ */
#s-hunt {
  align-items:center; justify-content:center;
  gap:1.8rem; padding:1.5rem;
  text-align:center;
}

.hunt-topbar {
  position:absolute; top:0; left:0; right:0;
  padding: calc(env(safe-area-inset-top,0px) + 0.75rem) 1rem 0.75rem;
  display:flex; align-items:center; gap:0.8rem;
}
.back-btn {
  width:38px; height:38px; border-radius:50%;
  background:var(--warm); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1rem; color:var(--text-soft);
  flex-shrink:0;
}
.hunt-loc-name {
  font-family:'DynaPuff',cursive;
  font-size:1.4rem; font-weight:700; color:var(--text);
  flex:1; text-align:left;
}
.hunt-progress {
  font-size:1.1rem; color:var(--text-faint);
  flex-shrink:0;
}

/* ORB */
.orb-wrap { position:relative; width:230px; height:230px; display:flex; align-items:center; justify-content:center; }
.orb-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid rgba(122,80,48,0.1);
}
.orb-ring-inner {
  position:absolute; inset:18px; border-radius:50%;
  border:1.5px solid rgba(122,80,48,0.07);
}
.orb {
  width:150px; height:150px; border-radius:50%;
  background:radial-gradient(circle at 38% 36%, #c8ddc9, #7a9e7e 60%, #4a7050);
  border:4px solid var(--sage);
  box-shadow:0 0 30px rgba(122,158,126,0.25), 0 4px 20px var(--shadow);
  display:flex; align-items:center; justify-content:center;
  font-size:3.2rem;
  transition:all 0.6s ease;
  z-index:2;
}
.orb.near {
  background:radial-gradient(circle at 38% 36%, #f5e0a0, #c8943a 60%, #7a5030);
  border-color:var(--gold);
  box-shadow:0 0 50px rgba(200,148,58,0.45), 0 4px 20px var(--shadow);
  animation:orbNear 1.8s ease-in-out infinite;
}
.orb.close {
  background:radial-gradient(circle at 38% 36%, #d0f0d0, #4a8a50 60%, #2a5a30);
  border-color:#60c060;
  box-shadow:0 0 70px rgba(80,200,80,0.55), 0 4px 20px var(--shadow);
  animation:orbClose 0.9s ease-in-out infinite;
}
@keyframes orbNear  { 0%,100%{box-shadow:0 0 40px rgba(200,148,58,0.4)} 50%{box-shadow:0 0 70px rgba(200,148,58,0.7)} }
@keyframes orbClose { 0%,100%{box-shadow:0 0 60px rgba(80,200,80,0.5)} 50%{box-shadow:0 0 90px rgba(80,200,80,0.8)} }

#hunt-dist {
  font-family:'DynaPuff',cursive;
  font-size:4.5rem; font-weight:700; color:var(--text);
  line-height:1;
}
#hunt-dist-unit { font-size:1.6rem; color:var(--text-soft); margin-top:0.2rem; }
#hunt-status { font-size:2rem; color:var(--text-soft); font-style:italic; }

#hunt-hint {
  font-size:1.25rem; color:var(--text-soft); font-style:italic;
  line-height:1.6; max-width:300px;
  background:rgba(122,80,48,0.05);
  border-left:3px solid var(--gold-pale);
  padding:0.8rem 1rem;
  border-radius:0 8px 8px 0;
  text-align:left;
}

/* Hold-to-unlock slot */
#lock-btn-wrap {
  display:none;
  flex-direction:column; align-items:center; gap:0.8rem;
  animation:btnPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
#lock-btn-wrap.show { display:flex; }

#lock-btn {
  width:110px; height:110px; border-radius:50%;
  background:var(--warm); border:4px solid var(--sage);
  display:flex; align-items:center; justify-content:center;
  font-size:3rem; cursor:pointer;
  position:relative; overflow:hidden;
  box-shadow:0 4px 20px rgba(74,112,80,0.2);
  user-select:none; -webkit-user-select:none;
  transition:border-color 0.3s;
}
#lock-btn.holding { border-color:var(--gold); }

/* Sweep fill */
#lock-btn-fill {
  position:absolute; inset:0; border-radius:50%;
  background: conic-gradient(rgba(74,112,80,0.25) 0%, transparent 0%);
  transition:none;
}

#lock-btn-label {
  font-size:1.2rem; color:var(--text-soft);
  font-family:"DynaPuff",cursive;
}

#debug-text { font-size:0.9rem; color:var(--text-faint); }

/* ══════════════════════════════════
   SCREEN 3 — GEVONDEN REVEAL
══════════════════════════════════ */
#s-reveal { overflow-y:auto; -webkit-overflow-scrolling:touch; }

.reveal-hero {
  height:220px; flex-shrink:0; position:relative;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.reveal-hero-bg {
  position:absolute; inset:0;
  background:linear-gradient(160deg, #c8ddc9 0%, #b0ccc0 50%, #a8c0b8 100%);
}
.reveal-hero-emoji { font-size:5rem; position:relative; z-index:2; }
.reveal-hero-fade {
  position:absolute; bottom:0; left:0; right:0; height:80px;
  background:linear-gradient(to bottom, transparent, var(--cream));
}

/* THE LETTER — centerpiece */
.letter-reveal-wrap {
  display:flex; flex-direction:column; align-items:center;
  padding:1.5rem 1.5rem 0;
  gap:0.5rem;
}
.letter-eyebrow {
  font-size:0.9rem; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--text-faint);
}
.letter-seal {
  width:120px; height:120px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold-pale), #f0d888);
  border:3px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-family:'DynaPuff',cursive;
  font-size:4.5rem; font-weight:700; color:var(--brown);
  box-shadow:0 6px 30px rgba(200,148,58,0.35);
  animation:sealIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes sealIn { from{transform:scale(0) rotate(-90deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
.letter-caption { font-size:0.9rem; color:var(--text-soft); font-style:italic; }

.reveal-body { padding:1.2rem 1.5rem 1rem; }
.reveal-loc-name {
  font-family:'DynaPuff',cursive;
  font-size:2.2rem; font-weight:700; margin-bottom:0.4rem;
}
.reveal-story {
  font-size:1.25rem; line-height:1.8; color:var(--text-soft);
  margin-bottom:1rem;
}
.reveal-task {
  background:rgba(122,80,48,0.06);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem 1.1rem;
  margin-bottom:1.2rem;
}
.reveal-task-title {
  font-size:0.9rem; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--gold); margin-bottom:0.5rem;
}
.reveal-task-text { font-size:1.25rem; line-height:1.6; color:var(--text); }

/* Word progress in reveal */
.reveal-word-wrap {
  display:flex; flex-direction:column; align-items:center; gap:0.6rem;
  padding:1rem; margin-bottom:1.2rem;
  background:var(--cream2); border-radius:var(--radius);
}
.reveal-word-label { font-size:1rem; color:var(--text-faint); letter-spacing:0.05em; font-family:"DynaPuff",cursive; }
.reveal-word-letters { display:flex; gap:0.5rem; }
.reveal-wl {
  width:50px; height:56px;
  border:2px solid var(--border); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DynaPuff',cursive;
  font-size:2rem; font-weight:700;
  background:var(--cream); color:var(--text-faint);
}
.reveal-wl.found { background:var(--gold-pale); border-color:var(--gold); color:var(--text); }
.reveal-wl.new-find { animation:letterPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

.btn-next {
  width:100%; padding:1rem;
  background:var(--sage-dark); color:#fff;
  border:none; border-radius:50px;
  font-family:'DynaPuff',cursive;
  font-size:1.3rem; font-weight:700;
  cursor:pointer; margin-bottom:2rem;
  box-shadow:0 4px 18px rgba(74,112,80,0.3);
}
.btn-next:active { transform:scale(0.97); }

/* ══════════════════════════════════
   SCREEN 4 — EINDE / WOORD CORRECT
══════════════════════════════════ */
#s-end {
  align-items:center; justify-content:center;
  text-align:center; gap:1.5rem; padding:2rem;
  background:linear-gradient(160deg, var(--cream) 0%, var(--cream2) 100%);
}
.end-emblem {
  width:120px; height:120px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold-pale), #f0d060);
  border:4px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:3.5rem;
  box-shadow:0 8px 40px rgba(200,148,58,0.4);
  animation:sealIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.end-title {
  font-family:'DynaPuff',cursive;
  font-size:2.8rem; font-weight:700; line-height:1.25;
}
.end-subtitle { font-size:1.3rem; color:var(--text-soft); font-style:italic; line-height:1.6; max-width:300px; }
.end-word-display { display:flex; gap:0.6rem; }
.end-wl {
  width:56px; height:64px;
  background:var(--gold-pale); border:3px solid var(--gold);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DynaPuff',cursive;
  font-size:2.2rem; font-weight:700; color:var(--brown);
  animation:letterPop 0.5s calc(var(--i)*0.1s) both;
}
.btn-restart {
  background:var(--sage-dark); color:#fff; border:none;
  border-radius:50px; padding:1.1rem 2.5rem;
  font-family:'DynaPuff',cursive;
  font-size:1.2rem; cursor:pointer;
  box-shadow:0 4px 18px rgba(74,112,80,0.3);
}

/* ══ SPLASH SCREEN ══ */
#s-splash {
  align-items:center; justify-content:center;
  gap:1.8rem; padding:2rem 2rem;
  text-align:center;
  background: #EBE7DE;
}
.splash-logo {
  width:240px; height:240px;
  object-fit:contain;
  animation:sealIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
.splash-tagline {
  font-size:1.5rem; font-style:italic;
  color:var(--text-soft); line-height:1.5;
  max-width:280px;
}
.btn-splash-start {
  width:100%; max-width:300px;
  padding:1.1rem 1.5rem;
  background:var(--sage-dark); color:#fff;
  border:none; border-radius:50px;
  font-family:"DynaPuff",cursive;
  font-size:1.6rem; font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(74,112,80,0.35);
  transition:all 0.2s;
}
.btn-splash-start:active { transform:scale(0.97); }
</style>
</head>

let foundLetters = new Array(5).fill(false);

// ══════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playChime() {
  try {
    const ctx = getAudio();
    [523,659,784,1047].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      const t = ctx.currentTime + i*0.18;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
      o.start(t); o.stop(t+0.6);
    });
  } catch(e){}
}

// ══════════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════════
function initMap() {
  const center = [LOCATIONS[0].lat, LOCATIONS[0].lng];
  map = L.map('map-el',{zoomControl:false,attributionControl:false}).setView(center,17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

  LOCATIONS.forEach(loc => {
    const el = document.createElement('div');
    el.className = 'vl-pin-wrap';
    const found = foundLetters[loc.id];
    el.innerHTML = `
      <div class="vl-pin-bubble ${found?'found':''}">
        <span class="vl-pin-icon">${loc.emoji}</span>
        <span class="vl-pin-name">${loc.name}</span>
        ${found ? '<span class="vl-pin-check">✓</span>' : ''}
      </div>`;
    el.style.cursor = 'pointer';

    const m = L.marker([loc.lat,loc.lng],{
      icon: L.divIcon({className:'',html:el,iconSize:[160,40],iconAnchor:[0,40]})
    }).addTo(map);

    // Use Leaflet's own click event — avoids iOS double-tap issue
    m.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      selectLoc(loc.id);
    });

    pinMarkers.push({marker:m, el, locId:loc.id});
  });

  // Tap on map background closes popup
  map.on('click', () => {
    document.getElementById('loc-popup').classList.remove('show');
  });

  renderWordBar('map-word-letters');
}

function refreshPins() {
  pinMarkers.forEach(({el, locId}) => {
    const found = foundLetters[locId];
    const bubble = el.querySelector('.vl-pin-bubble');
    bubble.className = 'vl-pin-bubble' + (found?' found':'') + (locId===activeLocId?' active-pin':'');
    bubble.innerHTML = `
      <span class="vl-pin-icon">${LOCATIONS[locId].emoji}</span>
      <span class="vl-pin-name">${LOCATIONS[locId].name}</span>
      ${found ? '<span class="vl-pin-check">✓</span>' : ''}`;
  });
}

function updatePlayerMarker() {
  if (!playerPos) return;
  const el = document.createElement('div');
  el.className='vl-player';
  if (!playerMarker) {
    playerMarker = L.marker([playerPos.lat,playerPos.lng],{
      icon:L.divIcon({className:'',html:el,iconSize:[16,16],iconAnchor:[8,8]})
    }).addTo(map);
  } else {
    playerMarker.setLatLng([playerPos.lat,playerPos.lng]);
  }
}

function selectLoc(id) {
  activeLocId = id;
  const loc = LOCATIONS[id];
  const found = foundLetters[id];

  document.getElementById('popup-emoji').textContent = loc.emoji;
  document.getElementById('popup-name').textContent  = loc.name;
  document.getElementById('popup-hint').textContent  = loc.hint;


  const badge = document.getElementById('popup-found-badge');
  badge.style.display = found ? 'inline-block' : 'none';

  const btn = document.getElementById('popup-go-btn');
  if (found) {
    btn.textContent = '✓ Al gevonden';
    btn.className = 'btn-go done';
    btn.onclick = null;
  } else {
    btn.textContent = 'Ga op zoek →';
    btn.className = 'btn-go';
    btn.onclick = startHunt;
  }

  document.getElementById('loc-popup').classList.add('show');
  map.flyTo([loc.lat,loc.lng],17,{animate:true,duration:0.6});
  refreshPins();
}

// ══════════════════════════════════════════════
//  HUNT SCREEN
// ══════════════════════════════════════════════
function startHunt() {
  if (activeLocId === null) return;
  document.getElementById('loc-popup').classList.remove('show');

  const loc = LOCATIONS[activeLocId];
  const num = LOCATIONS.filter((_,i) => foundLetters[i]).length + 1;

  document.getElementById('hunt-loc-name').textContent = loc.name;
  document.getElementById('hunt-progress').textContent = `${num}/5`;
  document.getElementById('hunt-hint').textContent     = `"${loc.hint}"`;
  document.getElementById('orb').textContent           = loc.emoji;
  document.getElementById('hunt-dist').textContent     = '—';
  document.getElementById('hunt-status').textContent   = 'Loop naar de plek…';
  document.getElementById('lock-btn-wrap').classList.remove('show');
  document.getElementById('lock-btn-fill').style.background = 'conic-gradient(rgba(74,112,80,0.25) 0%, transparent 0%)';
  document.getElementById('lock-icon').textContent = '🔒';
  document.getElementById('lock-btn').classList.remove('holding');
  currentZone = 'FAR';
  wasUnlocked = false;

  showScreen('s-hunt');
}

function goToMap() {
  showScreen('s-map');
  document.getElementById('loc-popup').classList.remove('show');
}

// ══════════════════════════════════════════════
//  GPS + ZONES
// ══════════════════════════════════════════════
function haversine(a,b,c,d) {
  const R=6371000,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function updateZone(dist) {
  if (currentZone==='FAR') {
    if (dist<=ZONES.CLOSE.enter) currentZone='CLOSE';
    else if (dist<=ZONES.NEAR.enter) currentZone='NEAR';
  } else if (currentZone==='NEAR') {
    if (dist<=ZONES.CLOSE.enter) currentZone='CLOSE';
    else if (dist>ZONES.NEAR.leave) currentZone='FAR';
  } else if (currentZone==='CLOSE') {
    if (dist>ZONES.CLOSE.leave) currentZone = dist>ZONES.NEAR.leave?'FAR':'NEAR';
  }
  return currentZone;
}

function onPosition(pos) {
  playerPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
  if (map) updatePlayerMarker();

  // Only update hunt logic if on hunt screen
  const onHunt = document.getElementById('s-hunt').classList.contains('active');
  if (!onHunt || activeLocId===null) return;

  const loc  = LOCATIONS[activeLocId];
  const dist = haversine(playerPos.lat, playerPos.lng, loc.lat, loc.lng);
  const zone = updateZone(dist);

  document.getElementById('hunt-dist').textContent =
    dist<1000 ? Math.round(dist) : (dist/1000).toFixed(1);
  document.getElementById('hunt-dist-unit').textContent =
    dist<1000 ? 'meter' : 'km';
  document.getElementById('debug-text').textContent =
    `GPS ±${Math.round(pos.coords.accuracy)}m · zone: ${zone}`;

  const orb = document.getElementById('orb');
  orb.className = 'orb';

  if (zone==='FAR') {
    document.getElementById('hunt-status').textContent = 'Loop naar de plek…';
    document.getElementById('reveal-btn').classList.remove('show');
    wasUnlocked = false;
  } else if (zone==='NEAR') {
    orb.classList.add('near');
    document.getElementById('hunt-status').textContent = 'Je komt dichtbij! 🔥';
    document.getElementById('reveal-btn').classList.remove('show');
    wasUnlocked = false;
  } else if (zone==='CLOSE') {
    orb.classList.add('close');
    document.getElementById('hunt-status').textContent = 'Je bent er! ⭐';
    if (!wasUnlocked) {
      document.getElementById('lock-btn-wrap').classList.add('show');
      playChime();
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      wasUnlocked = true;
    }
  }
}

// ══════════════════════════════════════════════
//  HOLD TO UNLOCK
// ══════════════════════════════════════════════
let holdTimer    = null;
let holdStart    = null;
const HOLD_MS    = 1500; // 1.5 sec to unlock
let holdRafId    = null;

function startHold(e) {
  e.preventDefault();
  holdStart = Date.now();
  document.getElementById('lock-btn').classList.add('holding');
  document.getElementById('lock-btn-label').textContent = 'Blijf vasthouden…';
  animateHold();
}

function animateHold() {
  if (!holdStart) return;
  const elapsed = Date.now() - holdStart;
  const pct = Math.min(elapsed / HOLD_MS, 1);
  const deg = Math.round(pct * 360);

  document.getElementById('lock-btn-fill').style.background =
    `conic-gradient(rgba(74,112,80,0.35) ${deg}deg, transparent ${deg}deg)`;

  // Pulse vibration every 300ms
  if (navigator.vibrate && elapsed > 0 && Math.floor(elapsed/300) > Math.floor((elapsed-16)/300)) {
    navigator.vibrate(15);
  }

  if (pct >= 1) {
    unlocked();
    return;
  }
  holdRafId = requestAnimationFrame(animateHold);
}

function stopHold() {
  if (!holdStart) return;
  const elapsed = Date.now() - holdStart;
  holdStart = null;
  cancelAnimationFrame(holdRafId);
  document.getElementById('lock-btn').classList.remove('holding');

  if (elapsed < HOLD_MS) {
    // Reset
    document.getElementById('lock-btn-fill').style.background =
      'conic-gradient(rgba(74,112,80,0.25) 0%, transparent 0%)';
    document.getElementById('lock-btn-label').textContent = 'Houd ingedrukt om te openen';
  }
}

function unlocked() {
  holdStart = null;
  cancelAnimationFrame(holdRafId);
  document.getElementById('lock-icon').textContent = '🔓';
  document.getElementById('lock-btn-fill').style.background =
    'conic-gradient(rgba(74,112,80,0.5) 360deg, transparent 360deg)';
  document.getElementById('lock-btn-label').textContent = '✓ Geopend!';
  playChime();
  if (navigator.vibrate) navigator.vibrate([100,50,100,50,300]);
  setTimeout(() => showReveal(), 600);
}

// ══════════════════════════════════════════════
//  REVEAL
// ══════════════════════════════════════════════
function showReveal() {
  if (activeLocId === null) return;
  const loc = LOCATIONS[activeLocId];

  // Mark as found
  foundLetters[activeLocId] = true;

  // Populate reveal screen
  const heroEl = document.getElementById('reveal-hero-emoji');
  if (loc.img) {
    heroEl.innerHTML = `<img src="${loc.img}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="">`;
    heroEl.style.fontSize = '0';
  } else {
    heroEl.innerHTML = loc.emoji;
    heroEl.style.fontSize = '5rem';
  }
  if (!loc.img) document.getElementById('reveal-hero-bg').style.background =
    `linear-gradient(160deg, ${loc.color}55 0%, ${loc.color}33 100%)`;
  document.getElementById('reveal-letter').textContent        = loc.letter;
  document.getElementById('reveal-loc-name').textContent      = loc.name;
  document.getElementById('reveal-story').textContent         = loc.story;
  document.getElementById('reveal-task-text').textContent     = loc.task;

  // Letter caption
  const idx = LOCATIONS.findIndex(l=>l.id===activeLocId);
  const ordinals = ['1e','2e','3e','4e','5e'];
  document.getElementById('reveal-letter-caption').textContent =
    `${ordinals[idx]} letter van het geheime woord`;

  // Word progress
  renderWordReveal();

  // Next button
  const allDone = foundLetters.every(Boolean);
  document.getElementById('btn-next').textContent = allDone
    ? '🏆 Onthul het geheime woord!' : 'Verder zoeken →';

  showScreen('s-reveal');
}

function afterReveal() {
  const allDone = foundLetters.every(Boolean);
  if (allDone) {
    showEnd();
  } else {
    refreshPins();
    renderWordBar('map-word-letters');
    showScreen('s-map');
    document.getElementById('loc-popup').classList.remove('show');
  }
}

// ══════════════════════════════════════════════
//  END SCREEN
// ══════════════════════════════════════════════
function showEnd() {
  const wrap = document.getElementById('end-word-display');
  wrap.innerHTML = WORD.split('').map((l,i) =>
    `<div class="end-wl" style="--i:${i}">${l}</div>`
  ).join('');
  document.getElementById('end-tip').textContent = WORD_TIP;
  showScreen('s-end');
}

function restartGame() {
  foundLetters = new Array(5).fill(false);
  activeLocId  = null;
  currentZone  = 'FAR';
  wasUnlocked  = false;
  renderWordBar('map-word-letters');
  refreshPins();
  showScreen('s-map');
}

// ══════════════════════════════════════════════
//  WORD RENDERING
// ══════════════════════════════════════════════
function renderWordBar(elId) {
  const wrap = document.getElementById(elId);
  wrap.innerHTML = LOCATIONS.map((loc,i) => {
    const found = foundLetters[i];
    return `<div class="word-letter ${found?'found':''}">${found?loc.letter:'_'}</div>`;
  }).join('');
}

function renderWordReveal() {
  const wrap = document.getElementById('reveal-word-letters');
  wrap.innerHTML = LOCATIONS.map((loc,i) => {
    const found = foundLetters[i];
    const isNew = found && loc.id===activeLocId;
    return `<div class="reveal-wl ${found?'found':''} ${isNew?'new-find':''}">${found?loc.letter:'_'}</div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Leaflet needs a size refresh whenever map becomes visible
  if (id === 's-map' && map) {
    setTimeout(() => map.invalidateSize(), 50);
  }
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
document.body.addEventListener('touchstart', ()=>getAudio(), {once:true});

navigator.geolocation.watchPosition(onPosition,
  () => { document.getElementById('debug-text').textContent = 'Geen GPS'; },
  {enableHighAccuracy:true, maximumAge:2000, timeout:15000}
);

initMap();
</script>
