<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f4f0">
<title>Verborgen Plek</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: Georgia, serif;
  background: #f0f4f0;
  color: #222;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  gap: 2.5rem;
  padding: 1.5rem;
}

/* ── COMPASS + ORB ── */
.compass-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Compass ring */
.compass-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid rgba(0,0,0,0.12);
}
.compass-ring svg {
  width: 100%;
  height: 100%;
  transition: transform 0.4s ease;
}

/* Center orb */
.orb {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #4a7a50, #1a3a1a);
  border: 4px solid #4a7a50;
  box-shadow: 0 0 30px rgba(74,122,80,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: background 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
  z-index: 2;
}

.orb.near {
  background: radial-gradient(circle at 38% 38%, #c4a020, #5a3a00);
  border-color: #e8c040;
  box-shadow: 0 0 40px rgba(232,192,64,0.5);
  animation: nearPulse 1.5s ease-in-out infinite;
}
.orb.close {
  background: radial-gradient(circle at 38% 38%, #40b060, #0a4a1a);
  border-color: #50d870;
  box-shadow: 0 0 60px rgba(80,216,112,0.7);
  animation: closePulse 0.8s ease-in-out infinite;
}

@keyframes nearPulse {
  0%,100% { box-shadow: 0 0 40px rgba(232,192,64,0.5); }
  50%      { box-shadow: 0 0 70px rgba(232,192,64,0.8); }
}
@keyframes closePulse {
  0%,100% { box-shadow: 0 0 60px rgba(80,216,112,0.7), 0 0 0 0 rgba(80,216,112,0.4); }
  50%      { box-shadow: 0 0 80px rgba(80,216,112,0.9), 0 0 30px rgba(80,216,112,0.2); }
}

.orb-icon {
  font-size: 2.8rem;
  line-height: 1;
  margin-bottom: 0.2rem;
}
.orb-label {
  font-size: 0.85rem;
  opacity: 0.7;
  letter-spacing: 0.05em;
}

/* ── DISTANCE TEXT ── */
#dist-text {
  font-size: 2rem;
  color: #555;
  letter-spacing: 0.05em;
  min-height: 2.5rem;
  text-align: center;
}

/* ── STATUS LINE ── */
#status-text {
  font-size: 1.6rem;
  font-weight: bold;
  text-align: center;
  min-height: 2rem;
  color: #333;
}

/* ── REVEAL BUTTON ── */
#reveal-btn {
  display: none;
  background: #e8c040;
  color: #1a1a00;
  border: none;
  border-radius: 60px;
  font-family: Georgia, serif;
  font-size: 1.7rem;
  font-weight: bold;
  padding: 1.1rem 2.2rem;
  cursor: pointer;
  box-shadow: 0 6px 30px rgba(232,192,64,0.5);
  animation: btnPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  width: 100%;
  max-width: 340px;
}
#reveal-btn.show { display: block; }
@keyframes btnPop {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ── GPS STATUS ── */
#gps-status { display: none; }

/* ══════════════════════════════
   REVEAL OVERLAY
══════════════════════════════ */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #f0f4f0;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: overlayIn 0.4s ease;
}
#overlay.show { display: flex; }
@keyframes overlayIn {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

.overlay-img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  background: linear-gradient(135deg, #c8ddc9, #b8cfd4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6rem;
  min-height: 200px;
  flex-shrink: 0;
}

.overlay-body {
  padding: 1.8rem 1.5rem 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  text-align: center;
  max-width: 420px;
  width: 100%;
}

.overlay-badge {
  background: #e8c040;
  color: #1a1a00;
  border-radius: 50px;
  padding: 0.5rem 1.4rem;
  font-size: 1rem;
  font-weight: bold;
  letter-spacing: 0.05em;
}

.overlay-title {
  font-size: 2rem;
  font-weight: bold;
  line-height: 1.3;
  color: #222;
}

.overlay-text {
  font-size: 1.25rem;
  line-height: 1.7;
  color: #444;
}

.overlay-points {
  background: rgba(232,192,64,0.12);
  border: 2px solid #e8c040;
  border-radius: 20px;
  padding: 1rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
}
.overlay-points-num {
  font-size: 3rem;
  font-weight: bold;
  color: #e8c040;
  line-height: 1;
}
.overlay-points-lbl {
  font-size: 1rem;
  color: #666;
}

.overlay-close {
  background: transparent;
  border: 2px solid rgba(0,0,0,0.2);
  color: #444;
  border-radius: 50px;
  padding: 0.9rem 2.2rem;
  font-family: Georgia, serif;
  font-size: 1.2rem;
  cursor: pointer;
  width: 100%;
  max-width: 280px;
  transition: all 0.2s;
}
.overlay-close:active {
  background: rgba(0,0,0,0.05);
}
</style>
</head>
<body>

<!-- COMPASS + ORB -->
<div class="compass-wrap">
  <!-- Compass SVG ring with N/O/Z/W and arrow -->
  <div class="compass-ring">
    <svg viewBox="0 0 260 260" id="compass-svg">
      <circle cx="130" cy="130" r="126" stroke="rgba(0,0,0,0.08)" stroke-width="2" fill="none"/>
      <circle cx="130" cy="130" r="118" stroke="rgba(0,0,0,0.04)" stroke-width="1" fill="none"/>
    </svg>
  </div>

  <!-- Center orb -->
  <div class="orb" id="orb">
    <div class="orb-icon" id="orb-icon">🧭</div>
  </div>
</div>

<!-- Distance -->
<div id="dist-text">GPS ophalen…</div>

<!-- Status -->
<div id="status-text"></div>

<!-- Reveal button -->
<button id="reveal-btn" onclick="showOverlay()">🗝️ Onthul het geheim!</button>

<!-- GPS dot -->
<div id="gps-status">
  <div class="gps-dot" id="gps-dot"></div>
  <span id="gps-label">ophalen</span>
</div>

<!-- ══ REVEAL OVERLAY ══ -->
<div id="overlay">
  <div class="overlay-img">🌿</div>
  <div class="overlay-body">
    <div class="overlay-badge">✨ Geheime plek gevonden!</div>
    <div class="overlay-title">De Oude Wilg</div>
    <div class="overlay-text">
      Deze wilg staat hier al meer dan 80 jaar. Vroeger gebruikten kinderen de takken als vishengel. Kijk goed — zie je nog de inkeping in de schors?
    </div>
    <div class="overlay-points">
      <div class="overlay-points-num">+50</div>
      <div class="overlay-points-lbl">punten verdiend!</div>
    </div>
    <button class="overlay-close" onclick="closeOverlay()">Volgende plek zoeken →</button>
  </div>
</div>

<script>
const TARGET = { lat: 52.2324006, lng: 6.1337074 };

// Smoothing: hysteresis per zone
// FAR > 25m, NEAR 10-25m, CLOSE < 10m
// With grace: once in CLOSE, need to go > 12m to leave
// Once in NEAR, need to go > 28m to leave
const ZONES = {
  CLOSE: { enter: 10, leave: 12 },
  NEAR:  { enter: 25, leave: 28 },
};

let currentZone = 'FAR'; // FAR | NEAR | CLOSE
let wasUnlocked = false;
let heading = null; // device compass heading
let lastBearing = 0;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playChime() {
  try {
    const ctx = getAudioCtx();
    [660, 880, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.15);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i*0.15 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.5);
      osc.start(ctx.currentTime + i*0.15);
      osc.stop(ctx.currentTime + i*0.15 + 0.5);
    });
  } catch(e) {}
}
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Bearing from current pos to target (degrees, 0=north)
function bearing(lat1, lng1, lat2, lng2) {
  const dLng = (lng2-lng1)*Math.PI/180;
  const y = Math.sin(dLng)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
           - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

function updateZone(dist) {
  if (currentZone === 'FAR') {
    if (dist <= ZONES.CLOSE.enter)     currentZone = 'CLOSE';
    else if (dist <= ZONES.NEAR.enter) currentZone = 'NEAR';
  } else if (currentZone === 'NEAR') {
    if (dist <= ZONES.CLOSE.enter)     currentZone = 'CLOSE';
    else if (dist > ZONES.NEAR.leave)  currentZone = 'FAR';
  } else if (currentZone === 'CLOSE') {
    if (dist > ZONES.CLOSE.leave) currentZone = dist > ZONES.NEAR.leave ? 'FAR' : 'NEAR';
  }
  return currentZone;
}

function onPosition(pos) {
  document.getElementById('gps-dot').className   = 'gps-dot on';
  document.getElementById('gps-label').textContent = 'GPS actief';

  const dist = haversine(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lng);
  const zone = updateZone(dist);

  document.getElementById('dist-text').textContent =
    dist < 1000 ? Math.round(dist) + ' meter' : (dist/1000).toFixed(1) + ' km';

  // Orb + status
  const orb = document.getElementById('orb');
  const icon = document.getElementById('orb-icon');
  const status = document.getElementById('status-text');
  const btn  = document.getElementById('reveal-btn');

  orb.className = 'orb';

  if (zone === 'FAR') {
    icon.textContent = '🧭';
    status.textContent = 'Loop naar de plek';
    btn.classList.remove('show');
  } else if (zone === 'NEAR') {
    orb.classList.add('near');
    icon.textContent = '🔥';
    status.textContent = 'Je komt dichtbij!';
    btn.classList.remove('show');
    if (currentZone !== 'NEAR') vibrate([100]);
  } else if (zone === 'CLOSE') {
    orb.classList.add('close');
    icon.textContent = '⭐';
    status.textContent = 'Je hebt het gevonden!';
    if (!wasUnlocked) {
      btn.classList.add('show');
      playChime();
      vibrate([200,100,200,100,400]);
      wasUnlocked = true;
    }
  }

  if (zone !== 'CLOSE') wasUnlocked = false;
}

function updateArrow() {
  // Arrow points to target relative to north
  // If we have device heading, subtract it so arrow is screen-relative
  const rotation = heading !== null ? (lastBearing - heading + 360) % 360 : lastBearing;
  document.getElementById('compass-arrow').setAttribute(
    'transform', `rotate(${rotation}, 130, 130)`
  );
}

// Device orientation for compass
function initOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    document.body.addEventListener('touchstart', async () => {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') listenOrientation();
      } catch(e) {}
    }, { once: true });
  } else if (window.DeviceOrientationEvent) {
    listenOrientation();
  }
}
function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', e => {
    if (e.alpha !== null) heading = e.alpha;
    updateArrow();
  }, true);
  window.addEventListener('deviceorientation', e => {
    if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
    else if (e.alpha !== null) heading = e.alpha;
    updateArrow();
  }, true);
}

function showOverlay() {
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// Unlock AudioContext on tap
document.body.addEventListener('touchstart', () => getAudioCtx(), { once: true });

navigator.geolocation.watchPosition(onPosition,
  () => {
    document.getElementById('gps-dot').className = 'gps-dot err';
    document.getElementById('gps-label').textContent = 'geen GPS';
    document.getElementById('dist-text').textContent = 'Geen locatie';
  },
  { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
);

initOrientation();
</script>
</body>
</html>
