<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>IDIOME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Inline:wght@400..900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F1E7;
    --panel: #FBF9F4;
    --ink: #262420;
    --line: #262420;
    --dim: #8A8577;
    --rhythm: #E7A8B8;
    --rhythm-deep: #C97E92;
    --sample: #A9C3A0;
    --sample-deep: #7FA073;
    --accent: #A7C4D9;
    --accent-deep: #7FA2BE;
    --yellow: #EAC468;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body{
    margin:0; padding:20px 16px 48px;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .wrap{ max-width: 760px; margin:0 auto; }

  /* ---- header / signature mark ---- */
  header{ text-align:center; margin-bottom: 26px; }
  h1{
    font-family: "Big Shoulders Inline", Futura, "Century Gothic", ui-sans-serif, system-ui, sans-serif;
    font-size: 56px; letter-spacing: 0.04em; text-transform: uppercase; margin:0;
    font-weight: 700; line-height:0.95;
  }
  .sub{ font-size:13px; color: var(--dim); letter-spacing:0.02em; margin-top:6px; }

  section.panel{
    background: var(--panel);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  section.panel.rhythm{ background: #F3DCE2; }
  section.panel.sample{ background: #E6EEE0; }
  .panel-title{
    font-family: "Big Shoulders Inline", Futura, "Century Gothic", ui-sans-serif, system-ui, sans-serif;
    font-size: 20px; letter-spacing: 0.05em; text-transform: uppercase; font-weight:700;
    margin: 0 0 12px;
  }
  .panel-title.rhythm{ color: var(--rhythm-deep); }
  .panel-title.sample{ color: var(--sample-deep); }

  .row{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .row label{ font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--ink); width:82px; flex-shrink:0; }
  input[type=range]{
    flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px;
    background: var(--ink); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background: var(--panel); border:2px solid var(--ink); cursor:pointer;
  }
  .panel.rhythm input[type=range]::-webkit-slider-thumb{ background: var(--rhythm); }
  .panel.sample input[type=range]::-webkit-slider-thumb{ background: var(--sample); }
  .val{ width:38px; text-align:right; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:12px; }

  select{
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:13px;
    border: none; border-radius:8px; background: #EFEAE0; color:var(--ink);
    padding: 8px 10px;
  }

  .transport-row{ display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  .transport-row .row{ flex:1; min-width:150px; }

  button{
    font-family: "Big Shoulders Inline", Futura, "Century Gothic", ui-sans-serif, system-ui, sans-serif;
    font-size:15px; letter-spacing:0.06em; text-transform:uppercase; font-weight:700;
    border: none; border-radius:8px; background: #EFEAE0; color:var(--ink);
    padding: 10px 18px; cursor:pointer;
  }
  button.solid{ background: var(--ink); color: var(--panel); }
  button#seedBtn{ background: var(--accent); }
  button#playBtn.playing{ background: var(--ink); color: var(--panel); }
  button:active{ transform: translateY(1px); }

  .fileRow{ display:flex; justify-content:center; }
  input[type=file]{ display:none; }

  .panels{ display:grid; grid-template-columns: 1fr; gap:14px; }
  @media (min-width: 680px){
    .panels{ grid-template-columns: 1fr 1fr; }
  }

  .playRow{ display:flex; gap:10px; margin-top:18px; }
  .playRow button{ flex:1; }

  footer{ text-align:center; font-size:10px; color: var(--dim); margin-top:18px; letter-spacing:0.02em; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Idiome</h1>
    <div class="sub">one sample, sliced into rhythm and dust</div>
  </header>

  <section class="panel">
    <div class="fileRow">
      <button type="button" onclick="document.getElementById('fileInput').click()">load your sample</button>
      <input type="file" id="fileInput" accept="audio/*" />
    </div>
  </section>

  <section class="panel">
    <div class="row"><label>bpm</label><input type="range" id="bpm" min="60" max="180" value="112"><span class="val" id="bpmVal">112</span></div>
    <div class="row"><label>division</label><select id="divSel">
        <option value="4">1/4</option>
        <option value="8">1/8</option>
        <option value="16" selected>1/16</option>
        <option value="32">1/32</option>
        <option value="64">1/64</option>
      </select></div>
    <div class="playRow">
      <button id="seedBtn" type="button">seed</button>
      <button id="playBtn" type="button">play</button>
      <button id="stopBtn" type="button">stop</button>
    </div>
  </section>

  <div class="panels">
    <section class="panel rhythm">
      <div class="panel-title rhythm">rhythm</div>
      <div class="row"><label>slices</label><input type="range" id="rSlices" min="0" max="100" value="28"><span class="val" id="rSlicesVal">28%</span></div>
      <div class="row"><label>rotation</label><input type="range" id="rRotation" min="0" max="100" value="0"><span class="val" id="rRotationVal">0%</span></div>
      <div class="row"><label>volume</label><input type="range" id="rVolume" min="0" max="150" value="100"><span class="val" id="rVolumeVal">100%</span></div>
      <div class="row"><label>filter</label><input type="range" id="rFilter" min="500" max="15000" value="6500"><span class="val" id="rFilterVal">6.5k</span></div>
    </section>

    <section class="panel sample">
      <div class="panel-title sample">sample</div>
      <div class="row"><label>slices</label><input type="range" id="sSlices" min="0" max="100" value="38"><span class="val" id="sSlicesVal">38%</span></div>
      <div class="row"><label>rotation</label><input type="range" id="sRotation" min="0" max="100" value="25"><span class="val" id="sRotationVal">25%</span></div>
      <div class="row"><label>volume</label><input type="range" id="sVolume" min="0" max="150" value="100"><span class="val" id="sVolumeVal">100%</span></div>
      <div class="row"><label>filter</label><input type="range" id="sFilter" min="500" max="15000" value="12000"><span class="val" id="sFilterVal">12k</span></div>
      <div class="row"><label>compress</label><input type="range" id="sCompress" min="0" max="100" value="45"><span class="val" id="sCompressVal">45%</span></div>
    </section>
  </div>

  <footer id="footerYear">idiome · © human motives</footer>
</div>

<script>
(function(){
"use strict";

// ================= audio setup =================
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sampleBuffer = null;

let masterGain, reverbNode, crushNode;
let rhythmBus, rhythmComp, rhythmCrush, rhythmTone, rhythmMakeup;
let sampleBus, sampleComp, sampleCompMakeup, sampleTone, sampleMakeup;

function setSoftClipCurve(node, drive){
  const n = 1024; const curve = new Float32Array(n); const norm = Math.tanh(drive);
  for (let i=0;i<n;i++){ const x=(i/(n-1))*2-1; curve[i]=Math.tanh(x*drive)/norm; }
  node.curve = curve;
}
function setCrushCurve(node, levels){
  const n = 1024; const curve = new Float32Array(n);
  for (let i=0;i<n;i++){ const x=(i/(n-1))*2-1; curve[i]=Math.round(x*levels)/levels; }
  node.curve = curve;
}
function routeOut(sourceNode, destNode, panVal){
  const p = audioCtx.createStereoPanner();
  p.pan.value = Math.max(-1, Math.min(1, panVal||0));
  sourceNode.connect(p);
  p.connect(destNode);
}

function buildFXChain(){
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.9;
  masterGain.connect(audioCtx.destination);

  const irLen = audioCtx.sampleRate*1.8;
  const ir = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch=0; ch<2; ch++){
    const d = ir.getChannelData(ch);
    for (let i=0;i<irLen;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 2.6);
  }
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = ir; reverbNode.normalize = true;
  crushNode = audioCtx.createWaveShaper();
  setCrushCurve(crushNode, 20);
  crushNode.connect(reverbNode);
  reverbNode.connect(masterGain);

  // rhythm lane bus — compressor + gentle saturation + lowpass + level
  rhythmBus = audioCtx.createGain();
  rhythmComp = audioCtx.createDynamicsCompressor();
  rhythmComp.threshold.value = -20; rhythmComp.knee.value = 6; rhythmComp.ratio.value = 8;
  rhythmComp.attack.value = 0.001; rhythmComp.release.value = 0.05;
  rhythmCrush = audioCtx.createWaveShaper();
  setSoftClipCurve(rhythmCrush, 2.2);
  rhythmTone = audioCtx.createBiquadFilter();
  rhythmTone.type = "lowpass"; rhythmTone.frequency.value = 6500;
  rhythmMakeup = audioCtx.createGain(); rhythmMakeup.gain.value = 1.0;
  rhythmBus.connect(rhythmComp).connect(rhythmCrush).connect(rhythmTone).connect(rhythmMakeup).connect(masterGain);

  // sample lane bus — compressor (pulls detail forward) + lowpass + level
  sampleBus = audioCtx.createGain();
  sampleComp = audioCtx.createDynamicsCompressor();
  sampleComp.threshold.value = -19; sampleComp.knee.value = 8; sampleComp.ratio.value = 5.7;
  sampleComp.attack.value = 0.008; sampleComp.release.value = 0.15;
  sampleCompMakeup = audioCtx.createGain(); sampleCompMakeup.gain.value = 1.72;
  sampleTone = audioCtx.createBiquadFilter();
  sampleTone.type = "lowpass"; sampleTone.frequency.value = 12000;
  sampleMakeup = audioCtx.createGain(); sampleMakeup.gain.value = 1.0;
  sampleBus.connect(sampleComp).connect(sampleCompMakeup).connect(sampleTone).connect(sampleMakeup).connect(masterGain);
}

// ================= material =================
function generateTexture(){
  const dur = 6, sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr*dur, sr);
  const d = buf.getChannelData(0);
  const layers = [{rate:0.07,depth:0.5},{rate:0.21,depth:0.35},{rate:0.5,depth:0.2}];
  let lp = 0;
  for (let i=0;i<d.length;i++){
    const t=i/sr; let s=0;
    for (const L of layers) s += (Math.random()*2-1)*(0.5+0.5*Math.sin(2*Math.PI*L.rate*t))*L.depth;
    lp += (s-lp)*0.18; d[i]=lp*0.9;
  }
  sampleBuffer = buf;
}
document.getElementById("fileInput").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if (!file) return;
  file.arrayBuffer().then(ab=>audioCtx.decodeAudioData(ab)).then(buf=>{
    sampleBuffer = buf;
  }).catch(()=>{});
});

// ================= seed region =================
let seedCenter = 0.5, seedSpread = 0.28;
function reseed(){
  seedCenter = Math.random();
  seedSpread = 0.12 + Math.random()*0.35;
  recomputeAll();
  randomizeMacro();
}
document.getElementById("seedBtn").addEventListener("click", ()=>{ audioCtx.resume(); reseed(); });

// ================= euclidean =================
function euclid(steps, pulses, rotation){
  const pattern = [];
  if (pulses<=0){ for(let i=0;i<steps;i++) pattern.push(false); return pattern; }
  if (pulses>=steps){ for(let i=0;i<steps;i++) pattern.push(true); return pattern; }
  let bucket=0;
  for (let i=0;i<steps;i++){
    bucket += pulses;
    if (bucket>=steps){ bucket-=steps; pattern.push(true); } else pattern.push(false);
  }
  const r = ((rotation%steps)+steps)%steps;
  return pattern.slice(r).concat(pattern.slice(0,r));
}

// ================= state =================
let STEPS = 16;
let rSlicesPct=28, rRotationPct=0, sSlicesPct=38, sRotationPct=25;
const rhythm = { pattern: [] };
const sample = { pattern: [] };
let rhythmData = [], sampleData = [];
let formShape = [];
const CHARACTER = 0.45;      // fixed mix of noise-like vs tone-like grains
const DRIFT = 0.28;          // fixed subtle humanization
const TOM_CHANCE = 0.22;
const BEAT_CHANCE = 0.08;

function pctToPulses(pct, maxP){ return Math.round((pct/100)*maxP); }
function pctToRotation(pct, steps){ return Math.round((pct/100)*(steps-1)); }

function windowScaleFactor(){
  if (STEPS<=8) return 7;
  if (STEPS<=16) return 2.2;
  return 1;
}

function generateFormShape(len){
  const shape = new Array(len).fill(1);
  let i=0;
  while (i<len){
    const r = Math.random();
    let blockLen, mult;
    if (r<0.6){ blockLen = 4+Math.floor(Math.random()*10); mult = 0.85+Math.random()*0.3; }
    else if (r<0.8){ blockLen = 1+Math.floor(Math.random()*2); mult = 3.5+Math.random()*4.5; }
    else { blockLen = 2+Math.floor(Math.random()*4); mult = 0.35+Math.random()*0.25; }
    for (let k=0;k<blockLen && i<len;k++,i++) shape[i]=mult;
  }
  return shape;
}

function assignTreatment(entry){
  entry.sampleOffsetFrac = Math.min(0.97, Math.max(0, seedCenter + (Math.random()-0.5)*2*seedSpread));
  const steps = Math.random()<0.6 ? 1 : 2;
  const up = Math.random()<0.5;
  entry.playbackRate = up ? Math.pow(2, steps) : Math.pow(2, -steps);
  entry.filterType = up ? "highpass" : "lowpass";
  entry.filterFreq = up ? (1100*steps) : (2000/steps);
  entry.filterQ = 0.7 + Math.random()*0.8;
}

function generateRhythmData(){
  rhythmData = [];
  formShape = generateFormShape(STEPS);
  for (let i=0;i<STEPS;i++){
    const useNoise = Math.random() < CHARACTER;
    const entry = { useNoise, velocity: 0.25+Math.random()*0.75, pan:(Math.random()*2-1)*0.8, formMult: formShape[i] };
    entry.beating = Math.random() < BEAT_CHANCE;
    if (entry.beating){
      entry.dur = 0.18+Math.random()*0.35;
      entry.sampleOffsetFrac = Math.min(0.97, Math.max(0, seedCenter+(Math.random()-0.5)*2*seedSpread));
      entry.baseRate = 0.75+Math.random()*0.6;
      const dir = Math.random()<0.5?-1:1;
      entry.detuneRatio = 1+dir*(0.004+Math.random()*0.012);
    } else if (Math.random() < TOM_CHANCE){
      entry.isTom = true;
      entry.sampleOffsetFrac = Math.min(0.97, Math.max(0, seedCenter+(Math.random()-0.5)*2*seedSpread));
      entry.dur = 0.09+Math.random()*0.16;
      entry.tomStartMult = 2.2+Math.random()*2.4;
      entry.baseRate = 0.35+Math.random()*0.3;
      entry.filterFreq = 220+Math.random()*280;
    } else {
      entry.impulseLike = useNoise && Math.random()<0.3;
      entry.dur = useNoise
        ? (entry.impulseLike ? (0.0004+Math.random()*0.0018) : (0.004+Math.random()*0.016))
        : (0.004+Math.random()*0.014);
      assignTreatment(entry);
    }
    if (!entry.isTom && !entry.beating){
      entry.dur = Math.min(0.06, Math.max(0.0003, entry.dur*entry.formMult));
    }
    rhythmData.push(entry);
  }
}

function generateSampleData(){
  sampleData = [];
  const scale = windowScaleFactor();
  for (let i=0;i<STEPS;i++){
    let f = seedCenter+(Math.random()-0.5)*2*seedSpread;
    f = Math.min(0.97, Math.max(0, f));
    const roll = Math.random();
    const shape = roll<0.4 ? "classic" : (roll<0.7 ? "swell-cut" : "hit-tail");
    const entry = {
      offsetFrac: f,
      playbackRate: 0.92+Math.random()*0.16,
      f0: 300+Math.random()*400,
      f1: 1800+Math.random()*3500,
      shape
    };
    if (shape==="classic"){
      entry.atk = (0.02+Math.random()*0.05)*scale;
      entry.dur = (0.14+Math.random()*0.22)*scale;
    } else if (shape==="swell-cut"){
      entry.atk = (0.15+Math.random()*0.25)*scale;
      entry.dur = entry.atk + (0.02+Math.random()*0.06)*scale;
    } else {
      entry.atk = 0.002+Math.random()*0.004;
      entry.dur = (0.05+Math.random()*0.07)*scale;
    }
    sampleData.push(entry);
  }
}

function recomputeAll(){
  const rPulses = pctToPulses(rSlicesPct, STEPS);
  const rRot = pctToRotation(rRotationPct, STEPS);
  const sPulses = pctToPulses(sSlicesPct, Math.floor(STEPS/2));
  const sRot = pctToRotation(sRotationPct, STEPS);
  rhythm.pattern = euclid(STEPS, rPulses, rRot);
  sample.pattern = euclid(STEPS, sPulses, sRot);
  generateRhythmData();
  generateSampleData();
}

// ---- control bindings ----
function bindPct(id, valId, setter){
  const el = document.getElementById(id), v = document.getElementById(valId);
  el.addEventListener("input", ()=>{
    setter(Number(el.value));
    v.textContent = el.value + "%";
    recomputeAll();
  });
}
bindPct("rSlices","rSlicesVal", (val)=>{ rSlicesPct = val; });
bindPct("rRotation","rRotationVal", (val)=>{ rRotationPct = val; });
bindPct("sSlices","sSlicesVal", (val)=>{ sSlicesPct = val; });
bindPct("sRotation","sRotationVal", (val)=>{ sRotationPct = val; });

document.getElementById("divSel").addEventListener("change", (e)=>{
  STEPS = Number(e.target.value);
  recomputeAll();
});

document.getElementById("rVolume").addEventListener("input", (e)=>{
  rhythmMakeup.gain.value = Number(e.target.value)/100;
  document.getElementById("rVolumeVal").textContent = e.target.value + "%";
});
document.getElementById("rFilter").addEventListener("input", (e)=>{
  rhythmTone.frequency.value = Number(e.target.value);
  document.getElementById("rFilterVal").textContent = (Number(e.target.value)/1000).toFixed(1) + "k";
});
document.getElementById("sVolume").addEventListener("input", (e)=>{
  sampleMakeup.gain.value = Number(e.target.value)/100;
  document.getElementById("sVolumeVal").textContent = e.target.value + "%";
});
document.getElementById("sFilter").addEventListener("input", (e)=>{
  sampleTone.frequency.value = Number(e.target.value);
  document.getElementById("sFilterVal").textContent = (Number(e.target.value)/1000).toFixed(1) + "k";
});
document.getElementById("sCompress").addEventListener("input", (e)=>{
  const amt = Number(e.target.value)/100;
  sampleComp.threshold.value = -6 - amt*29;
  sampleComp.ratio.value = 3 + amt*6;
  sampleComp.attack.value = 0.012 - amt*0.009;
  sampleCompMakeup.gain.value = 1 + amt*1.6;
  document.getElementById("sCompressVal").textContent = e.target.value + "%";
});

// ================= macro (hidden — gentle autonomous movement) =================
let macroLength = 7, macroValues = [];
const EVOLVE = 0.15;
function randomizeMacro(){
  macroValues = [];
  for (let i=0;i<macroLength;i++) macroValues.push(0.1+Math.random()*0.7);
}
function maybeEvolveMacro(){
  if (Math.random() < EVOLVE*0.15){
    const idx = Math.floor(Math.random()*macroLength);
    const delta = (Math.random()-0.5)*(0.03+EVOLVE*0.12);
    macroValues[idx] = Math.min(1, Math.max(0, macroValues[idx]+delta));
  }
}
randomizeMacro();

// ================= voice builders =================
function getJitteredPan(basePan){ return (basePan||0) + (Math.random()-0.5)*0.3*DRIFT; }

function steppedDecay(param, when, dur, peak){
  param.setValueAtTime(0, when);
  param.linearRampToValueAtTime(peak, when+0.0006);
  const steps = 3+Math.floor(Math.random()*4);
  for (let i=1;i<=steps;i++){
    const t = when+0.0006+dur*(i/steps);
    param.setValueAtTime(peak*(1-i/steps), t);
  }
}

function buildSampleGrain(when, entry, volFactor){
  const env = audioCtx.createGain();
  if (!sampleBuffer) return env;
  const vol = volFactor*entry.velocity;
  const src = audioCtx.createBufferSource();
  src.buffer = sampleBuffer;
  if (entry.playbackRate) src.playbackRate.value = entry.playbackRate;
  const offset = entry.sampleOffsetFrac*sampleBuffer.duration;
  const peak = (entry.impulseLike?0.6:(entry.useNoise?0.5:0.42))*vol;
  steppedDecay(env.gain, when, entry.dur, peak);
  if (entry.filterType){
    const filt = audioCtx.createBiquadFilter();
    filt.type = entry.filterType; filt.frequency.value = entry.filterFreq; filt.Q.value = entry.filterQ;
    src.connect(filt).connect(env);
  } else { src.connect(env); }
  routeOut(env, rhythmBus, getJitteredPan(entry.pan));
  src.start(when, offset, entry.dur+0.01);
  return env;
}

function buildSampleTom(when, entry, volFactor){
  const env = audioCtx.createGain();
  if (!sampleBuffer) return env;
  const vol = volFactor*entry.velocity;
  const src = audioCtx.createBufferSource();
  src.buffer = sampleBuffer;
  const startRate = entry.baseRate*entry.tomStartMult;
  src.playbackRate.setValueAtTime(startRate, when);
  src.playbackRate.exponentialRampToValueAtTime(Math.max(entry.baseRate,0.05), when+entry.dur*0.55);
  const filt = audioCtx.createBiquadFilter();
  filt.type = "lowpass"; filt.frequency.value = entry.filterFreq; filt.Q.value = 0.9;
  const peak = 0.5*vol;
  env.gain.setValueAtTime(0, when);
  env.gain.linearRampToValueAtTime(peak, when+0.003);
  env.gain.exponentialRampToValueAtTime(0.001, when+entry.dur);
  const offset = entry.sampleOffsetFrac*sampleBuffer.duration;
  src.connect(filt).connect(env);
  routeOut(env, rhythmBus, getJitteredPan(entry.pan));
  src.start(when, offset);
  src.stop(when+entry.dur+0.05);
  return env;
}

function buildSampleBeating(when, entry, volFactor){
  const env = audioCtx.createGain();
  if (!sampleBuffer) return env;
  const vol = volFactor*entry.velocity;
  const peak = 0.15*vol;
  env.gain.setValueAtTime(0, when);
  env.gain.linearRampToValueAtTime(peak, when+0.035);
  env.gain.linearRampToValueAtTime(0, when+entry.dur);
  const offset = entry.sampleOffsetFrac*sampleBuffer.duration;
  const s1 = audioCtx.createBufferSource(); s1.buffer = sampleBuffer; s1.playbackRate.value = entry.baseRate;
  const s2 = audioCtx.createBufferSource(); s2.buffer = sampleBuffer; s2.playbackRate.value = entry.baseRate*entry.detuneRatio;
  s1.connect(env); s2.connect(env);
  routeOut(env, rhythmBus, getJitteredPan(entry.pan));
  s1.start(when, offset); s2.start(when, offset);
  s1.stop(when+entry.dur+0.05); s2.stop(when+entry.dur+0.05);
  return env;
}

function scheduleRepeats(entry, when, volFactor){
  const count = 2+Math.floor(Math.random()*3);
  for (let r=1;r<=count;r++){
    const t = when + r*(0.028+Math.random()*0.018);
    const rvol = volFactor*(0.75-r*0.14);
    if (rvol<=0.05) continue;
    if (entry.isTom) buildSampleTom(t, entry, rvol);
    else if (entry.beating) buildSampleBeating(t, entry, rvol);
    else buildSampleGrain(t, entry, rvol);
  }
}

function playRhythmHit(when, macroVal, entry, volFactor){
  let env;
  if (entry.isTom) env = buildSampleTom(when, entry, volFactor);
  else if (entry.beating) env = buildSampleBeating(when, entry, volFactor);
  else env = buildSampleGrain(when, entry, volFactor);

  if (Math.random() < 1/25){
    const wet = audioCtx.createGain();
    wet.gain.value = 0.5+macroVal*0.5;
    env.connect(wet); wet.connect(crushNode);
  }
  if (Math.random() < 1/28){
    scheduleRepeats(entry, when, volFactor);
  }
}

function playSampleWindow(when, macroVal, entry){
  if (!sampleBuffer) return;
  const offset = entry.offsetFrac*sampleBuffer.duration;
  const dur = entry.dur;
  const src = audioCtx.createBufferSource();
  src.buffer = sampleBuffer;
  src.playbackRate.value = entry.playbackRate;

  const filt = audioCtx.createBiquadFilter();
  filt.type = "lowpass";
  filt.frequency.setValueAtTime(entry.f0, when);
  filt.frequency.linearRampToValueAtTime(entry.f1, when+dur);
  filt.Q.value = 1.2;

  const env = audioCtx.createGain();
  const atk = entry.atk;
  if (entry.shape==="swell-cut"){
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(0.45, when+atk);
    env.gain.setValueAtTime(0.45, when+dur-0.005);
    env.gain.setValueAtTime(0, when+dur);
  } else if (entry.shape==="hit-tail"){
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(0.5, when+atk);
    env.gain.exponentialRampToValueAtTime(0.001, when+dur);
  } else {
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(0.45, when+atk);
    env.gain.linearRampToValueAtTime(0, when+dur);
  }

  src.connect(filt).connect(env).connect(sampleBus);

  const wet = audioCtx.createGain();
  if (entry.shape==="hit-tail"){
    wet.gain.setValueAtTime(0, when);
    wet.gain.linearRampToValueAtTime(0.75, when+atk);
    wet.gain.linearRampToValueAtTime(0.3, when+dur+0.6);
  } else {
    wet.gain.setValueAtTime(0, when);
    wet.gain.linearRampToValueAtTime(macroVal*0.5, when+atk);
    wet.gain.linearRampToValueAtTime(macroVal*0.1, when+dur);
  }
  env.connect(wet); wet.connect(crushNode);

  src.start(when, offset, Math.max(dur, entry.shape==="hit-tail"?0.6:dur));

  if (macroVal > 0.62){
    const repeats = 1+Math.floor((macroVal-0.62)*6);
    for (let r=1;r<=repeats;r++){
      const t = when + r*(0.045+Math.random()*0.02);
      const rs = audioCtx.createBufferSource();
      rs.buffer = sampleBuffer;
      const rg = audioCtx.createGain();
      rg.gain.setValueAtTime(0.4/(r+1), t);
      rg.gain.linearRampToValueAtTime(0, t+0.05);
      rs.connect(rg).connect(sampleBus);
      rs.start(t, offset, 0.045);
    }
  }
}

// ================= scheduler =================
const lookahead = 25.0, scheduleAheadTime = 0.12;
let nextStepTime=0, stepCounter=0, timerID=null, isPlaying=false;

function stepDuration(){
  const bpm = Number(document.getElementById("bpm").value);
  const stepsPerBeat = STEPS/4;
  return (60/bpm)/stepsPerBeat;
}
function scheduleStep(stepIndex, time){
  const idx = stepIndex % STEPS;
  const macroIdx = stepIndex % macroLength;
  const mVal = macroValues[macroIdx];
  maybeEvolveMacro();
  if (rhythm.pattern[idx]){
    const jitter = (Math.random()-0.5)*0.03*DRIFT;
    const volFactor = 1+(Math.random()-0.5)*0.6*DRIFT;
    playRhythmHit(time+jitter, mVal, rhythmData[idx], volFactor);
  }
  if (sample.pattern[idx]){
    const jitterB = (Math.random()-0.5)*0.02*DRIFT;
    playSampleWindow(time+jitterB, mVal, sampleData[idx]);
  }
}
function scheduler(){
  while (nextStepTime < audioCtx.currentTime+scheduleAheadTime){
    scheduleStep(stepCounter, nextStepTime);
    nextStepTime += stepDuration();
    stepCounter++;
  }
  timerID = setTimeout(scheduler, lookahead);
}
function startPlayback(){
  if (isPlaying) return;
  if (!sampleBuffer) generateTexture();
  audioCtx.resume();
  isPlaying = true;
  stepCounter = 0;
  nextStepTime = audioCtx.currentTime+0.05;
  scheduler();
  document.getElementById("playBtn").classList.add("playing");
}
function stopPlayback(){
  isPlaying = false;
  clearTimeout(timerID);
  document.getElementById("playBtn").classList.remove("playing");
}
document.getElementById("playBtn").addEventListener("click", startPlayback);
document.getElementById("stopBtn").addEventListener("click", stopPlayback);
document.getElementById("bpm").addEventListener("input", (e)=>{
  document.getElementById("bpmVal").textContent = e.target.value;
});

// ================= init =================
buildFXChain();
generateTexture();
recomputeAll();
document.getElementById("footerYear").textContent = "idiome · © " + new Date().getFullYear() + " human motives";

})();
</script>
