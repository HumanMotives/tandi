<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jong Nederland Activiteiten</title>

  <style>
    :root {
      --bg: #f5f1e7;
      --card: #ffffff;
      --text: #1d2b36;
      --muted: #73808c;
      --line: rgba(29, 43, 54, 0.1);
      --green: #15a457;
      --green-dark: #0d7a40;
      --blue: #1462c8;
      --shadow: 0 16px 36px rgba(23, 37, 48, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 14px 60px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo {
      width: min(300px, 70vw);
    }

    .summary-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .summary-total {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--green-dark);
    }

    .filters {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border-radius: 999px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      background: white;
      font-weight: bold;
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--blue);
      color: white;
    }

    .featured-grid {
      display: grid;
      gap: 18px;
      margin-bottom: 20px;
    }

    .featured-card {
      position: relative;
      min-height: 360px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .featured-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
    }

    .featured-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
    }

    .featured-content {
      position: relative;
      padding: 24px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: white;
    }

    .featured-title {
      font-size: 2rem;
      margin: 0;
    }

    .cards-grid {
      display: grid;
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/8;
      object-fit: cover;
    }

    .card-body {
      padding: 16px;
    }

    .event-title {
      font-size: 1.1rem;
      margin: 0 0 6px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .meta-label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .meta-value {
      font-weight: bold;
    }

    .action-btn {
      margin-top: 12px;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: #e2efe8;
      color: var(--green-dark);
      font-weight: bold;
      cursor: pointer;
    }

    .action-btn.active {
      background: var(--green);
      color: white;
    }

    .count-select {
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      width: 100%;
    }

    @media(min-width: 768px) {
      .featured-grid.two {
        grid-template-columns: 1fr 1fr;
      }

      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="logo-wrap">
      <img class="logo" src="./Jong Nederland Logo.svg" />
    </div>

    <div class="summary-card">
      <div>Totaal verwachte deelnemers</div>
      <div class="summary-total" id="total">0</div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Alles</button>
        <button class="filter-btn" data-filter="individual">Individueel</button>
        <button class="filter-btn" data-filter="group">Groep</button>
      </div>
    </div>

    <section id="featured" class="featured-grid"></section>
    <section id="grid" class="cards-grid"></section>

  </main>

  <script>
    const GROUP_OPTIONS = [10,20,25,30,40,50];

    const events = [
      {
        id:"festival",
        featured:true,
        type:"group",
        title:"Festival Back2Basic",
        date:"10 apr 2027",
        location:"BillyBird",
        image:"./images/zomer.jpg",
        base:80
      },
      {
        id:"kader",
        featured:true,
        type:"individual",
        title:"Kaderschouw",
        date:"25-27 sep 2026",
        location:"Heeswijk",
        image:"./images/zomer.jpg",
        base:20
      },
      {
        id:"webinar",
        type:"individual",
        title:"Webinar wetgeving",
        date:"12 nov 2026",
        location:"Online",
        image:"./images/zomer.jpg",
        base:6
      },
      {
        id:"toernooi",
        type:"group",
        title:"Landelijk Toernooi",
        date:"24-26 okt",
        location:"TBD",
        image:"./images/zomer.jpg",
        base:120
      }
    ];

    const state = {};

    function getTotal(){
      let sum = 0;
      events.forEach(e=>{
        if(e.type==="individual"){
          sum += e.base + (state[e.id]?.on?1:0);
        } else {
          sum += e.base + (state[e.id]?.count||0);
        }
      });
      document.getElementById("total").innerText = sum;
    }

    function toggle(id){
      state[id] = state[id] || {};
      state[id].on = !state[id].on;
      render();
    }

    function setCount(id,val){
      state[id] = state[id] || {};
      state[id].count = parseInt(val);
      state[id].on = true;
      render();
    }

    function render(){
      const f = document.getElementById("featured");
      const g = document.getElementById("grid");

      f.innerHTML="";
      g.innerHTML="";

      events.forEach(e=>{
        if(e.featured){
          f.innerHTML += `
          <div class="featured-card">
            <img src="${e.image}">
            <div class="featured-overlay"></div>
            <div class="featured-content">
              <h2 class="featured-title">${e.title}</h2>
              <button class="action-btn ${state[e.id]?.on?"active":""}" onclick="toggle('${e.id}')">
                ${e.type==="group"?"Wij komen":"Ik ben erbij"}
              </button>
            </div>
          </div>`;
        } else {
          g.innerHTML += `
          <div class="card">
            <img src="${e.image}">
            <div class="card-body">
              <h3 class="event-title">${e.title}</h3>

              <div class="meta-grid">
                <div>
                  <div class="meta-label">Datum</div>
                  <div class="meta-value">${e.date}</div>
                </div>
                <div>
                  <div class="meta-label">Locatie</div>
                  <div class="meta-value">${e.location}</div>
                </div>
              </div>

              <button class="action-btn ${state[e.id]?.on?"active":""}" onclick="toggle('${e.id}')">
                ${e.type==="group"?"Wij komen":"Ik ben erbij"}
              </button>

              ${e.type==="group" && state[e.id]?.on ? `
                <select class="count-select" onchange="setCount('${e.id}',this.value)">
                  ${GROUP_OPTIONS.map(v=>`<option>${v}</option>`).join("")}
                </select>
              `:""}
            </div>
          </div>`;
        }
      });

      getTotal();
    }

    render();
  </script>
</body>
</html>
