<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VOID KULTUR • Type Engine v3</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>VOID KULTUR • TYPE ENGINE v3</header>

<main class="wrap">

<section class="controls">

<h3>WORDS</h3>
<textarea id="words">SPECTERS
RITUAL_
AGAIN</textarea>

<div class="row">
<label>Seconds per word
<input id="secPerWord" type="number" step="0.1" value="0.8"/>
</label>
<label>Total duration
<input id="totalSec" type="number" value="10"/>
</label>
</div>

<div class="row">
<label>Letter Mode
<select id="letterMode">
<option value="none">None</option>
<option value="sequential" selected>Sequential</option>
</select>
</label>
<label>Layout
<select id="layoutMode">
<option value="center">Center</option>
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
</select>
</label>
</div>

<div class="row">
<label>Size
<input id="sizeScale" type="range" min="50" max="150" value="100"/>
</label>
<label>Glitch
<input id="glitch" type="range" min="0" max="100" value="40"/>
</label>
</div>

<div class="row">
<label>Background
<select id="bgMode">
<option value="black">Black</option>
<option value="white">White</option>
</select>
</label>

<label>Font Color
<select id="fontPreset">
<option value="white">White</option>
<option value="black">Black</option>
<option value="red">Red</option>
<option value="custom">Custom</option>
</select>
</label>
</div>

<div class="row">
<label>Custom Color
<input id="fontColor" type="color" value="#ffffff"/>
</label>
</div>

<button id="previewBtn">Preview</button>
<button id="stopBtn">Stop</button>
<button id="recordBtn">Record</button>

<div id="status">Idle</div>

</section>

<section class="preview">
<div class="phone">
<canvas id="canvas"></canvas>
</div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
