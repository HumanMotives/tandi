<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VOID KULTUR • Type Engine v2</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<header>
  <div class="brand">VOID KULTUR • TYPE ENGINE v2</div>
</header>

<main class="layout">

  <section class="controls">
    <h3>WORDS</h3>
    <textarea id="words">SPECTERS
RITUAL_
AGAIN</textarea>

    <div class="row">
      <label>Seconds per word
        <input id="secPerWord" type="number" step="0.1" value="0.8" />
      </label>
      <label>Total duration (sec)
        <input id="totalSec" type="number" value="12" />
      </label>
    </div>

    <div class="row">
      <label>Letter animation
        <select id="letterMode">
          <option value="none">None</option>
          <option value="sequential" selected>Sequential</option>
        </select>
      </label>
      <label>Layout
        <select id="layoutMode">
          <option value="center" selected>Center</option>
          <option value="vertical">Vertical stack</option>
          <option value="horizontal">Horizontal spread</option>
        </select>
      </label>
    </div>

    <div class="row">
      <label>Size scale
        <input id="sizeScale" type="range" min="40" max="140" value="100" />
      </label>
      <label>Background
        <select id="bgMode">
          <option value="black" selected>Black</option>
          <option value="white">White</option>
        </select>
      </label>
    </div>

    <button id="previewBtn">Preview</button>
    <button id="stopBtn">Stop</button>
    <button id="recordBtn">Record + Download</button>

    <div id="status">Idle</div>
  </section>

  <section class="previewArea">
    <div class="phoneFrame">
      <canvas id="canvas"></canvas>
    </div>
  </section>

</main>

<script type="module" src="./app.js"></script>
</body>
</html>
